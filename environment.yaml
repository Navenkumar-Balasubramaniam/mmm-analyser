# MMM Analyser — Conda Environment
# Usage:
#   conda env create -f environment.yaml
#   conda activate mmm-analyser

name: mmm-analyser
channels:
  - conda-forge
  - defaults

dependencies:
  # ── Python ─────────────────────────────────────────────
  - python=3.11

  # ── Core data stack ────────────────────────────────────
  - pandas=2.2.*
  - numpy=1.26.*
  - scipy=1.13.*

  # ── Bayesian modelling ─────────────────────────────────
  - pymc=5.16.*
  - arviz=0.19.*
  - pytensor=2.25.*

  # ── Visualisation ──────────────────────────────────────
  - plotly=5.24.*
  - matplotlib=3.9.*

  # ── UI ─────────────────────────────────────────────────
  - streamlit=1.38.*

  # ── Testing ────────────────────────────────────────────
  - pytest=8.3.*
  - pytest-cov=5.0.*

  # ── Config & secrets ───────────────────────────────────
  - pyyaml=6.0.*
  - python-dotenv=1.0.*

  # ── pip-only packages ──────────────────────────────────
  - pip
  - pip:
      - pymc-marketing==0.19.*
      - openai==1.51.*         # OpenRouter uses OpenAI-compatible API
